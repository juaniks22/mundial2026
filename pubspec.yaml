name: mundial2026
description: Calendario y rastreador personal del Mundial de Fútbol 2026

publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP Client
  dio: ^5.4.0

  # State Management
  flutter_riverpod: ^2.4.10

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10    # crests de football-data.org son SVG
  intl: ^0.19.0

flutter:
  uses-material-design: true

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

